name: "🚀 CD Pipeline — Deploy to Kubernetes"

on:
  workflow_run:
    workflows: ["🔥 CI Pipeline — Build, Test, Scan"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/flask-api

jobs:
  deploy:
    name: "☸️ Deploy to K8s"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Update image tag in manifests
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          sed -i "s|image: flask-api:latest|image: ${IMAGE}|g" k8s/app/deployment.yaml

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/security/rbac.yaml
          kubectl apply -f k8s/security/network-policy.yaml
          kubectl apply -f k8s/database/
          kubectl apply -f k8s/redis/
          kubectl apply -f k8s/app/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/flask-api -n flask-app --timeout=300s

      - name: Verify deployment
        run: |
          echo "=== Pods ==="
          kubectl get pods -n flask-app -o wide
          echo ""
          echo "=== Services ==="
          kubectl get svc -n flask-app
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n flask-app

      - name: Smoke test
        run: |
          kubectl port-forward svc/flask-api-service 8080:80 -n flask-app &
          sleep 5
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/live)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Smoke test failed! HTTP $HTTP_CODE"
            kubectl rollout undo deployment/flask-api -n flask-app
            exit 1
          fi
          
          echo "✅ Smoke test passed — HTTP $HTTP_CODE"
