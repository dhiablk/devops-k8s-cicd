apiVersion: v1
kind: ServiceAccount
metadata:
  name: flask-api-sa
  namespace: flask-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flask-api-role
  namespace: flask-app
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flask-api-rolebinding
  namespace: flask-app
subjects:
  - kind: ServiceAccount
    name: flask-api-sa
    namespace: flask-app
roleRef:
  kind: Role
  name: flask-api-role
  apiGroup: rbac.authorization.k8s.io
